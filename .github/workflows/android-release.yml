name: Build and Publish Release APK

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'app/build.gradle.kts'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if release already exists (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write # Required for creating GitHub Releases and tags

jobs:
  check-version:
    name: Detect Version & Check Status
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version_tag: ${{ steps.check.outputs.version_tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Version Name
        id: extract_version
        run: |
          VERSION_NAME=$(grep -E "versionName\s*=" app/build.gradle.kts | sed -E 's/.*versionName\s*=\s*"([^"]*)".*/\1/')
          echo "Extracted Version: $VERSION_NAME"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Check if Release Exists
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v${{ steps.extract_version.outputs.version_name }}"
          echo "Checking if release for tag $TAG_NAME already exists..."
          
          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            echo "Release $TAG_NAME already exists."
            if [ "${{ github.event.inputs.force_build }}" = "true" ]; then
              echo "Force build is enabled. Proceeding to build."
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              echo "No new version change detected. Skipping build."
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No release found for $TAG_NAME. New version change detected!"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
          echo "version_tag=$TAG_NAME" >> $GITHUB_OUTPUT

  build:
    name: Build & Release Sideloadable APK
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Setup Keystore & Signing Configuration
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Decoding release keystore from secrets..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-upload-key.jks
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "No custom keystore provided in secrets. Generating a temporary self-signed keystore for sideloadable release..."
            keytool -genkey -v -keystore my-upload-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload -storepass defaultpass -keypass defaultpass -dname "CN=BMS Manager, OU=Mobile, O=AI Studio, L=Cloud, S=Android, C=US"
            echo "STORE_PASSWORD=defaultpass" >> $GITHUB_ENV
            echo "KEY_PASSWORD=defaultpass" >> $GITHUB_ENV
          fi
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/my-upload-key.jks" >> $GITHUB_ENV

      - name: Build Release APK
        run: |
          gradle :app:assembleRelease --no-daemon

      - name: Prepare APK Asset
        id: prepare_asset
        run: |
          # Locate built APK
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: Release APK not found!"
            exit 1
          fi
          
          VERSION_TAG="${{ needs.check-version.outputs.version_tag }}"
          RENAME_APK="BMS_Manager_${VERSION_TAG}.apk"
          cp "$APK_PATH" "$RENAME_APK"
          
          echo "APK_PATH=$RENAME_APK" >> $GITHUB_ENV
          echo "Ready to release: $RENAME_APK"

      - name: Create GitHub Release and Upload Sideloadable APK
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          tag_name: ${{ needs.check-version.outputs.version_tag }}
          name: Release ${{ needs.check-version.outputs.version_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
